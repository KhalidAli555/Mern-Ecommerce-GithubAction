trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: 'Install Node.js'

# Build Frontend
- script: |
    cd frontend
    npm install
    npm run build
  displayName: 'Build Frontend'

# Build Backend
- script: |
    cd backend
    npm install
  displayName: 'Build Backend'
