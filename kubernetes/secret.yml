apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: mern-ecommerce
type: Opaque
stringData:
  # Replace every placeholder before applying. Never commit real values.
  MONGO_INITDB_ROOT_USERNAME: "CHANGE_ME_MONGODB_USERNAME"
  MONGO_INITDB_ROOT_PASSWORD: "CHANGE_ME_MONGODB_PASSWORD"
  MONGO_URI: "mongodb://CHANGE_ME_MONGODB_USERNAME:CHANGE_ME_MONGODB_PASSWORD@database:27017/ecommerce?authSource=admin"
  EMAIL: "CHANGE_ME_SMTP_EMAIL"
  PASSWORD: "CHANGE_ME_SMTP_PASSWORD"
  SECRET_KEY: "CHANGE_ME_WITH_A_LONG_RANDOM_SECRET"
