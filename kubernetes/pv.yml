apiVersion: v1
kind: PersistentVolume
metadata:
  name: mongodb-pv
  labels:
    app: database
spec:
  capacity:
    storage: 10Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    # Suitable for a single-node development cluster. Use a CSI-backed volume in production.
    path: /mnt/data/mern-ecommerce-mongodb
    type: DirectoryOrCreate
